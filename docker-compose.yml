version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: patch-postgres
    environment:
      POSTGRES_DB: patch_compliance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sagar@9945
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: patch-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patch_compliance_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Sagar@9945
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: patch-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: